<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#0d1117"/>

  <text x="60" y="72" fill="#f0f6fc" font-size="38" font-weight="800">Perfect retrieval, still rotting</text>
  <text x="60" y="108" fill="#8b949e" font-size="19">Llama-3.1-8B: the answer is present, yet accuracy collapses as input grows.</text>

  <!-- gridlines 100@170 75@250 50@330 25@410 0@490 -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="170" y1="170" x2="1090" y2="170"/>
    <line x1="170" y1="250" x2="1090" y2="250"/>
    <line x1="170" y1="330" x2="1090" y2="330"/>
    <line x1="170" y1="410" x2="1090" y2="410"/>
    <line x1="170" y1="490" x2="1090" y2="490"/>
  </g>
  <g fill="#6e7681" font-size="15" text-anchor="end">
    <text x="156" y="175">100%</text>
    <text x="156" y="255">75%</text>
    <text x="156" y="335">50%</text>
    <text x="156" y="415">25%</text>
    <text x="156" y="495">0%</text>
  </g>

  <!-- legend -->
  <rect x="800" y="92" width="22" height="22" fill="#58a6ff"/>
  <text x="830" y="109" fill="#c9d1d9" font-size="16">short context</text>
  <rect x="940" y="92" width="22" height="22" fill="#f85149"/>
  <text x="970" y="109" fill="#c9d1d9" font-size="16">~30K tokens</text>

  <!-- Variable Summation: 96 -> 11 -->
  <rect x="225" y="183" width="60" height="307" fill="#58a6ff"/>
  <rect x="295" y="455" width="60" height="35" fill="#f85149"/>
  <text x="255" y="175" fill="#58a6ff" font-size="16" font-weight="700" text-anchor="middle">96%</text>
  <text x="325" y="447" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">11%</text>

  <!-- HumanEval: 57.3 -> 9.7 -->
  <rect x="445" y="307" width="60" height="183" fill="#58a6ff"/>
  <rect x="515" y="459" width="60" height="31" fill="#f85149"/>
  <text x="475" y="299" fill="#58a6ff" font-size="16" font-weight="700" text-anchor="middle">57%</text>
  <text x="545" y="451" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">10%</text>

  <!-- MMLU: 63.2 -> 39 -->
  <rect x="665" y="288" width="60" height="202" fill="#58a6ff"/>
  <rect x="735" y="365" width="60" height="125" fill="#f85149"/>
  <text x="695" y="280" fill="#58a6ff" font-size="16" font-weight="700" text-anchor="middle">63%</text>
  <text x="765" y="357" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">39%</text>

  <!-- GSM8K: 87.8 -> 75.5 -->
  <rect x="885" y="209" width="60" height="281" fill="#58a6ff"/>
  <rect x="955" y="248" width="60" height="242" fill="#f85149"/>
  <text x="915" y="201" fill="#58a6ff" font-size="16" font-weight="700" text-anchor="middle">88%</text>
  <text x="985" y="240" fill="#f85149" font-size="16" font-weight="700" text-anchor="middle">76%</text>

  <g fill="#c9d1d9" font-size="17" font-weight="600" text-anchor="middle">
    <text x="290" y="515">Variable Summation</text>
    <text x="510" y="515">HumanEval</text>
    <text x="730" y="515">MMLU</text>
    <text x="950" y="515">GSM8K</text>
  </g>

  <text x="60" y="600" fill="#6e7681" font-size="14">Source: Du, Tian, Ronanki, Rongali, Bodapati, Galstyan, Wells, Schwartz, Huerta, Peng — "Context Length Alone Hurts LLM Performance Despite Perfect Retrieval", Findings of EMNLP 2025.</text>
</svg>
