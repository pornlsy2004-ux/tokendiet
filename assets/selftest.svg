<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#0d1117"/>

  <text x="60" y="72" fill="#f0f6fc" font-size="38" font-weight="800">We didn't just theorize — we ran it.</text>
  <text x="60" y="108" fill="#8b949e" font-size="19">Claude Haiku, fresh context each trial. Find one fact vs. actually use the whole context.</text>

  <!-- gridlines 100@180 75@252 50@325 25@397 0@470 -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="170" y1="180" x2="1090" y2="180"/>
    <line x1="170" y1="252" x2="1090" y2="252"/>
    <line x1="170" y1="325" x2="1090" y2="325"/>
    <line x1="170" y1="397" x2="1090" y2="397"/>
    <line x1="170" y1="470" x2="1090" y2="470"/>
  </g>
  <g fill="#6e7681" font-size="15" text-anchor="end">
    <text x="156" y="185">100%</text>
    <text x="156" y="257">75%</text>
    <text x="156" y="330">50%</text>
    <text x="156" y="402">25%</text>
    <text x="156" y="475">0%</text>
  </g>
  <text x="70" y="325" fill="#8b949e" font-size="15" transform="rotate(-90 70 325)" text-anchor="middle">accuracy</text>

  <g fill="#6e7681" font-size="15" text-anchor="middle">
    <text x="200" y="495">50</text>
    <text x="420" y="495">200</text>
    <text x="640" y="495">500</text>
    <text x="860" y="495">900</text>
    <text x="1080" y="495">1400</text>
  </g>
  <text x="640" y="525" fill="#8b949e" font-size="15" text-anchor="middle">context size (lines / near-identical distractors) →</text>

  <!-- retrieval: flat 100% (green) -->
  <polyline fill="none" stroke="#3fb950" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
            points="200,180 420,180 640,180 860,180 1080,180"/>
  <g fill="#3fb950"><circle cx="200" cy="180" r="5"/><circle cx="420" cy="180" r="5"/><circle cx="640" cy="180" r="5"/><circle cx="860" cy="180" r="5"/><circle cx="1080" cy="180" r="5"/></g>
  <text x="660" y="168" fill="#3fb950" font-size="18" font-weight="700">Find one fact → 100% (retrieval doesn't rot)</text>

  <!-- counting: collapse (red) -->
  <polyline fill="none" stroke="#f85149" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
            points="200,276 420,374 640,470 860,470 1080,470"/>
  <g fill="#f85149"><circle cx="200" cy="276" r="5"/><circle cx="420" cy="374" r="5"/><circle cx="640" cy="470" r="5"/><circle cx="860" cy="470" r="5"/><circle cx="1080" cy="470" r="5"/></g>
  <text x="470" y="350" fill="#f85149" font-size="18" font-weight="700">Count the whole context → 67% → 0%</text>

  <text x="60" y="575" fill="#6e7681" font-size="14">3 trials/size. At 500+ items the model stops counting and just guesses the average (250 / 450 / 700).</text>
  <text x="60" y="598" fill="#6e7681" font-size="14">Reproducible harness + raw results: /benchmark/</text>
</svg>
