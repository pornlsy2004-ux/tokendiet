<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#0d1117"/>

  <text x="60" y="70" fill="#f0f6fc" font-size="40" font-weight="800">Same answer. A fraction of the tokens.</text>
  <text x="60" y="106" fill="#8b949e" font-size="19">13 questions, Claude Opus 4.8 — full document vs. a careful compression vs. just the relevant sentence.</text>

  <!-- panel titles -->
  <text x="345" y="150" fill="#c9d1d9" font-size="20" font-weight="700" text-anchor="middle">Accuracy</text>
  <text x="875" y="150" fill="#c9d1d9" font-size="20" font-weight="700" text-anchor="middle">Median context tokens</text>

  <!-- LEFT: accuracy gridlines 100@180 50@325 0@470 -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="150" y1="180" x2="540" y2="180"/>
    <line x1="150" y1="325" x2="540" y2="325"/>
    <line x1="150" y1="470" x2="540" y2="470"/>
  </g>
  <g fill="#6e7681" font-size="14" text-anchor="end">
    <text x="142" y="185">100%</text>
    <text x="142" y="330">50%</text>
    <text x="142" y="475">0%</text>
  </g>
  <!-- accuracy bars: all 85% -> top y=223 -->
  <rect x="175" y="223" width="70" height="247" fill="#8b949e"/>
  <rect x="295" y="223" width="70" height="247" fill="#58a6ff"/>
  <rect x="415" y="223" width="70" height="247" fill="#3fb950"/>
  <g fill="#f0f6fc" font-size="18" font-weight="700" text-anchor="middle">
    <text x="210" y="214">85%</text>
    <text x="330" y="214">85%</text>
    <text x="450" y="214">85%</text>
  </g>
  <g fill="#8b949e" font-size="15" text-anchor="middle">
    <text x="210" y="492">Raw</text>
    <text x="330" y="492">Compressed</text>
    <text x="450" y="492">Subtracted</text>
  </g>

  <!-- RIGHT: tokens gridlines (scale 0..240) 240@180 120@325 0@470 -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="660" y1="180" x2="1080" y2="180"/>
    <line x1="660" y1="325" x2="1080" y2="325"/>
    <line x1="660" y1="470" x2="1080" y2="470"/>
  </g>
  <g fill="#6e7681" font-size="14" text-anchor="end">
    <text x="652" y="185">240</text>
    <text x="652" y="330">120</text>
    <text x="652" y="475">0</text>
  </g>
  <!-- token bars: 218, 108, 28 -->
  <rect x="665" y="207" width="70" height="263" fill="#8b949e"/>
  <rect x="785" y="340" width="70" height="130" fill="#58a6ff"/>
  <rect x="905" y="436" width="70" height="34" fill="#3fb950"/>
  <g fill="#f0f6fc" font-size="18" font-weight="700" text-anchor="middle">
    <text x="700" y="198">218</text>
    <text x="820" y="331">108</text>
    <text x="940" y="427">28</text>
  </g>
  <g fill="#8b949e" font-size="15" text-anchor="middle">
    <text x="700" y="492">Raw</text>
    <text x="820" y="492">Compressed</text>
    <text x="940" y="492">Subtracted</text>
  </g>

  <text x="60" y="560" fill="#c9d1d9" font-size="18" font-weight="600">Compression didn't change accuracy. Subtraction matched it using ~1/8 the tokens.</text>
  <text x="60" y="588" fill="#6e7681" font-size="14">A null result on compression — and a clean win for including less. Reproducible: /benchmark · large-scale context rot: /docs/receipts.md</text>
</svg>
